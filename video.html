<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #111; color: white; margin: 0; font-family: sans-serif; }
        .player-container { padding: 15px; text-align: center; }
        .thumb-box { width: 100%; max-width: 600px; margin: 0 auto 20px auto; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; cursor: pointer; }
        .thumb-box img { width: 100%; display: block; filter: brightness(0.8); }
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; color: rgba(255,255,255,0.9); }
        
        .video-details { text-align: left; max-width: 600px; margin: 0 auto; padding: 10px; }
        .video-details h2 { font-size: 20px; color: #00897b; margin-bottom: 10px; }
        
        /* 🔥 Working Tags Style */
        .tag-container { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
        .tag-btn { background: #222; color: #00d4ff; border: 1px solid #00d4ff; padding: 5px 12px; border-radius: 20px; font-size: 13px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .tag-btn:hover { background: #00d4ff; color: black; }

        .action-area { margin-top: 30px; text-align: center; }
        .play-btn { background: #00897b; color: white; padding: 15px 40px; text-decoration: none; border-radius: 50px; display: inline-flex; align-items: center; gap: 10px; font-weight: bold; font-size: 18px; box-shadow: 0 5px 15px rgba(0,137,123,0.4); }
    </style>
</head>
<body>

<header class="header">
    <a href="javascript:history.back()" style="color:white; text-decoration:none;"><span class="material-icons">arrow_back</span></a>
    <h1>TeraBox Player</h1>
    <span class="material-icons">share</span>
</header>

<div class="player-container">
    <div class="thumb-box" id="thumb-container">
        <img id="v-thumb" src="" alt="Video Thumbnail">
        <span class="material-icons play-icon">play_circle_filled</span>
    </div>

    <div class="video-details">
        <h2 id="v-title">Loading Title...</h2>
        <div class="tag-container" id="v-tags"></div>
    </div>

    <div class="action-area">
        <a id="v-link" href="#" class="play-btn">
            <span class="material-icons">play_arrow</span> Watch Full Video
        </a>
    </div>
</div>

<script id="schema-script" type="application/ld+json">{}</script>

<script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title');
    const link = params.get('link');
    const img = params.get('img');
    const tags = params.get('tags'); // Naya Param

    if(title) {
        document.getElementById('v-title').innerText = title;
        document.title = title;
    }

    if(link) {
        document.getElementById('v-link').href = link;
        document.getElementById('thumb-container').onclick = function() { window.location.href = link; };
    }

    if(img) { document.getElementById('v-thumb').src = img; }

    // 🔥 WORKING TAGS LOGIC
    if(tags) {
        const tagBox = document.getElementById('v-tags');
        const tagList = tags.split(',');
        tagList.forEach(tag => {
            const cleanTag = tag.trim();
            const a = document.createElement('a');
            a.className = 'tag-btn';
            // Click karne par index.html par bhejega aur wahan search chal jayega
            a.href = "index.html?search=" + encodeURIComponent(cleanTag);
            a.innerText = "#" + cleanTag;
            tagBox.appendChild(a);
        });
    }

    // Dynamic Schema (Same as before)
    try {
        const schemaData = {
          "@context": "https://schema.org",
          "@type": "VideoObject",
          "name": title || "Viral Video",
          "thumbnailUrl": img || "favicon.png",
          "uploadDate": new Date().toISOString(),
          "contentUrl": window.location.href
        };
        document.getElementById('schema-script').text = JSON.stringify(schemaData);
    } catch(e) {}
</script>
</body>
</html>
