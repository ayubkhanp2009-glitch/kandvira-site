<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Online - Hollywood Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00d4ff; --bg: #050505; --card-bg: #121212; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; overflow-x: hidden; }
        nav { background: #000; padding: 10px 5%; border-bottom: 1px solid #222; text-align: center; }
        .logo { color: var(--accent); font-size: 20px; font-weight: 800; text-decoration: none; }
        
        .player-container { 
            max-width: 400px; 
            margin: 10px auto; 
            padding: 0 15px; 
            display: flex;
            flex-direction: column;
            height: auto;
        }

        .video-wrapper {
            width: 100%;
            position: relative;
            padding-top: 140%; 
            background: #000;
            border-radius: 15px;
            border: 2px solid #222;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .video-wrapper img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        .play-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            color: white;
            z-index: 5;
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
        }

        .movie-details { 
            margin-top: 15px; 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 15px; 
            border: 1px solid #222; 
            text-align: center;
        }

        .file-tag { background: var(--accent); color: #000; padding: 4px 10px; border-radius: 5px; font-weight: bold; font-size: 11px; }
        
        #movieTitle { font-size: 18px; margin: 10px 0; color: white; line-height: 1.3; }

        /* Description Style */
        #movieDesc { 
            font-size: 13px; 
            color: #aaa; 
            line-height: 1.5; 
            margin-bottom: 15px; 
            text-align: left; 
            display: none; /* Default hidden */
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        .btn-watch { 
            display: block; 
            background: var(--accent); 
            color: #000; 
            text-align: center; 
            padding: 12px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 16px; 
            box-shadow: 0 4px 10px rgba(0, 212, 255, 0.3);
        }

        @media (min-width: 768px) {
            .video-wrapper { padding-top: 177.77%; }
            .player-container { margin: 30px auto; }
        }
    </style>
</head>
<body>

<nav><a href="movies.html" class="logo">HOLLYWOOD<span style="color:white">PRO</span></a></nav>

<div class="player-container">
    <a href="#" id="mainPlayLink">
        <div class="video-wrapper">
            <img src="" id="playerPoster">
            <div class="play-overlay"><i class="fas fa-play-circle"></i></div>
        </div>
    </a>

    <div class="movie-details">
        <span class="file-tag" id="fileNoTag">FILE NO. --</span>
        <h1 id="movieTitle">Loading...</h1>
        
        <div id="movieDesc"></div>

        <a href="#" id="watchBtn" class="btn-watch">WATCH NOW (TERABOX)</a>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    
    // Title, File No, Poster set karna
    document.getElementById('movieTitle').innerText = urlParams.get('name') || "Hollywood Movie";
    document.getElementById('fileNoTag').innerText = "[FILE NO. " + (urlParams.get('file') || "000") + "]";
    document.getElementById('playerPoster').src = urlParams.get('poster') || "";
    
    // Description logic
    const description = urlParams.get('desc');
    if (description) {
        const descBox = document.getElementById('movieDesc');
        descBox.innerText = description;
        descBox.style.display = "block"; // Show only if description exists
    }
    
    // Links set karna
    const mTera = urlParams.get('link') || "#";
    document.getElementById('mainPlayLink').href = mTera;
    document.getElementById('watchBtn').href = mTera;
</script>

</body>
</html>
