<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Online - Hollywood Pro</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .player-box { width: 100%; max-width: 700px; height: 350px; background: #000; margin: 20px auto; border: 2px solid #00d4ff; display: flex; align-items: center; justify-content: center; border-radius: 10px; overflow: hidden; }
        .player-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        .btn-play { background: #00d4ff; color: #000; padding: 15px 30px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 20px; display: inline-block; margin-top: 20px; }
        .file-no { color: #00d4ff; font-weight: bold; }
    </style>
</head>
<body>

    <nav><h1>HOLLYWOOD<span style="color:#00d4ff">PRO</span></h1></nav>

    <div class="player-box">
        <img src="" id="p_img">
        <div style="position:absolute; font-size: 50px;">▶</div>
    </div>

    <p class="file-no" id="p_file">FILE NO. --</p>
    <h2 id="p_name">Loading Movie...</h2>

    <a href="#" id="p_link" class="btn-play">START WATCHING</a>

    <script>
        // Simple data extraction
        const params = new URLSearchParams(window.location.search);
        
        const mName = params.get('name');
        const mFile = params.get('file');
        const mPost = params.get('poster');
        const mLink = params.get('link');

        if(mName) document.getElementById('p_name').innerText = mName;
        if(mFile) document.getElementById('p_file').innerText = "[FILE NO. " + mFile + "]";
        if(mPost) document.getElementById('p_img').src = mPost;
        if(mLink) {
            document.getElementById('p_link').href = mLink;
            // Agar koi player box par bhi click kare toh link khule
            document.querySelector('.player-box').onclick = function() { window.location.href = mLink; };
        }
    </script>
</body>
</html>
