<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hollywood Pro - Private Database</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00d4ff; --bg: #050505; --card-bg: #121212; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }
        nav { background: rgba(0,0,0,0.9); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--accent); font-size: 22px; font-weight: 800; text-decoration: none; }
        .hero { padding: 40px 20px; text-align: center; background: linear-gradient(to bottom, #111, var(--bg)); }
        #movieSearch { width: 90%; max-width: 500px; padding: 15px 25px; border-radius: 50px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; }
        .container { padding: 20px 5%; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px; }
        .movie-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; position: relative; transition: 0.4s; border: 1px solid #222; }
        .movie-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .badge { position: absolute; top: 10px; left: 10px; background: var(--accent); color: #000; font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 4px; z-index: 10; }
        .movie-card img { width: 100%; height: 250px; object-fit: cover; }
        .movie-info { padding: 15px; }
        .file-no { color: var(--accent); font-weight: bold; font-size: 13px; display: block; margin-bottom: 5px; }
        .movie-title { font-size: 14px; font-weight: 600; margin-bottom: 15px; height: 40px; overflow: hidden; }
        .btn-download { background: transparent; color: var(--accent); text-decoration: none; padding: 8px; border-radius: 8px; font-size: 13px; display: block; text-align: center; font-weight: bold; border: 1px solid var(--accent); }
        @media (max-width: 480px) { .movie-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; } }
    </style>
</head>
<body>

<nav><a href="movies.html" class="logo">HOLLYWOOD<span style="color:white">PRO</span></a></nav>

<div class="hero">
    <h1>Premium Database</h1>
    <input type="text" id="movieSearch" placeholder="Search File No. or Name..." onkeyup="filterMovies()">
</div>

<div class="container">
    <div class="movie-grid" id="movieList">
        
        <div class="movie-card">
            <div class="badge">MOVIE</div>
            <img src="https://via.placeholder.com/300x450?text=Batman" alt="Movie">
            <div class="movie-info">
                <span class="file-no">[FILE NO. 101]</span>
                <div class="movie-title">The Batman (2024)</div>
                <a href="watch-movie.html?name=The Batman (2024)&file=101&poster=https://via.placeholder.com/300x450?text=Batman&link=YOUR_TERABOX_LINK" class="btn-download">Watch Now</a>
            </div>
        </div>

        <div class="movie-card">
            <div class="badge" style="background:#ff0055; color:#fff;">SERIES</div>
            <img src="https://via.placeholder.com/300x450?text=Stranger+Things" alt="Series">
            <div class="movie-info">
                <span class="file-no">[FILE NO. 102]</span>
                <div class="movie-title">Stranger Things S05</div>
                <a href="watch-movie.html?name=Stranger Things S05&file=102&poster=https://via.placeholder.com/300x450?text=Stranger+Things&link=YOUR_TERABOX_LINK" class="btn-download">Watch Now</a>
            </div>
        </div>

    </div>
</div>

<script>
    function filterMovies() {
        let input = document.getElementById('movieSearch').value.toLowerCase();
        let cards = document.getElementsByClassName('movie-card');
        for (let i = 0; i < cards.length; i++) {
            let text = cards[i].innerText.toLowerCase();
            cards[i].style.display = text.includes(input) ? "" : "none";
        }
    }
</script>
</body>
</html>
