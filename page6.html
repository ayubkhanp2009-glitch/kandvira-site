<script>
    function openNav() { document.getElementById("mySidebar").style.width = "250px"; document.getElementById("overlay").style.display = "block"; }
    function closeNav() { document.getElementById("mySidebar").style.width = "0"; document.getElementById("overlay").style.display = "none"; }
    function openSearch() { document.getElementById("searchBar").style.display = "flex"; document.getElementById("searchInput").focus(); }
    function closeSearch() { 
        document.getElementById("searchBar").style.display = "none"; 
        document.getElementById("searchInput").value = ""; 
        filterVideos();
    }

    function filterVideos() {
        let filter = document.getElementById("searchInput").value.toLowerCase();
        let cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            let title = card.querySelector('.card-title').innerText.toLowerCase();
            let linkParams = card.getAttribute('href').toLowerCase();
            card.style.display = (title.includes(filter) || linkParams.includes(filter)) ? "block" : "none";
        });
    }
    document.getElementById("searchInput").onkeyup = filterVideos;
</script>
